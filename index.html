<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://unpkg.com/@rive-app/canvas@latest"></script>
</head>

<body style="margin:0;min-height:100vh;background:#111;display:flex;align-items:center;justify-content:center;">
  <div style="background:#282828;border-radius:20px;padding:32px;width:80%;max-width:900px;">
    <div style="background:#1b1b1b;border-radius:20px;height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <canvas id="canvas" style="width:640px;height:65px;"></canvas>
    </div>

    <div style="display:flex;justify-content:space-between;gap:24px;margin-top:28px;color:white;font-family:Arial;">
      <div>
        <p>Shape color</p>
        <input id="colorPicker" type="color" value="#FFB429" />
      </div>

      <div>
        <p>Artboard width</p>
        <input id="widthSlider" type="range" min="213" max="820" value="640" />
        <p>Width: <span id="widthValue">640</span>px</p>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const colorPicker = document.getElementById("colorPicker");
    const widthSlider = document.getElementById("widthSlider");
    const widthValue = document.getElementById("widthValue");

    let shapeColorProperty;

    const r = new rive.Rive({
      src: "cta_click.riv",
      canvas: canvas,
      autoplay: true,
      autoBind: true,
      stateMachines: "State Machine 1",
      layout: new rive.Layout({
        fit: rive.Fit.Layout,
        alignment: rive.Alignment.Center
      }),
      onLoad: () => {
        r.resizeDrawingSurfaceToCanvas();

        const instance = r.viewModelInstance;
        shapeColorProperty = instance.color("shapeColor");

        shapeColorProperty.value = hexToRiveColor(colorPicker.value);
      }
    });

    function hexToRiveColor(hex) {
      const clean = hex.replace("#", "");
      return parseInt("FF" + clean, 16);
    }

    colorPicker.addEventListener("input", () => {
      if (shapeColorProperty) {
        shapeColorProperty.value = hexToRiveColor(colorPicker.value);
      }
    });

    widthSlider.addEventListener("input", () => {
      const width = widthSlider.value;
      canvas.style.width = width + "px";
      canvas.style.height = "65px";
      widthValue.textContent = width;

      requestAnimationFrame(() => {
        r.resizeDrawingSurfaceToCanvas();
      });
    });
  </script>
</body>
</html>
