<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://unpkg.com/@rive-app/canvas@latest"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111111;
      color: #f1f1f1;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 80%;
      max-width: 900px;
      background: #282828;
      border-radius: 20px;
      padding: 32px;
    }

    .rive-box {
      height: 180px;
      background: #1b1b1b;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      width: 640px;
      height: 65px;
      display: block;
    }

    .controls {
      margin-top: 28px;
      display: flex;
      justify-content: space-between;
      gap: 32px;
      align-items: flex-end;
    }

    label {
      display: block;
      margin-bottom: 12px;
      color: #cfcfcf;
      font-size: 14px;
    }

    input[type="color"] {
      width: 72px;
      height: 44px;
      padding: 0;
      border: 0;
      background: none;
      cursor: pointer;
    }

    input[type="range"] {
      width: 260px;
    }

    .width-text {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="rive-box">
      <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
      <div>
        <label>Shape color</label>
        <input id="colorPicker" type="color" value="#FFB429" />
      </div>

      <div>
        <label>Artboard width</label>
        <input id="widthSlider" type="range" min="213" max="820" value="640" />
        <div class="width-text">Width: <span id="widthValue">640</span>px</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const colorPicker = document.getElementById("colorPicker");
    const widthSlider = document.getElementById("widthSlider");
    const widthValue = document.getElementById("widthValue");

    let shapeColorProperty = null;
    let colorStringProperty = null;

    const r = new rive.Rive({
      src: "cta_click.riv",
      canvas: canvas,
      autoplay: true,
      autoBind: true,
      stateMachines: "State Machine 1",

      layout: new rive.Layout({
        fit: rive.Fit.Layout,
        alignment: rive.Alignment.Center
      }),

      onLoad: () => {
        r.resizeDrawingSurfaceToCanvas();

        const instance = r.viewModelInstance;

        shapeColorProperty = instance.color("shapeColor");
        colorStringProperty = instance.string("color");

        updateColor(colorPicker.value);
        updateSize();
      }
    });

    function colorAARRGGBB(hex) {
      const clean = hex.replace("#", "");
      return Number("0xFF" + clean);
    }

    function colorRRGGBBAA(hex) {
      const clean = hex.replace("#", "");
      return Number("0x" + clean + "FF");
    }

    function updateColor(hex) {
      if (colorStringProperty) {
        colorStringProperty.value = hex;
      }

      if (shapeColorProperty) {
        shapeColorProperty.value = colorAARRGGBB(hex);

        setTimeout(() => {
          shapeColorProperty.value = colorRRGGBBAA(hex);
        }, 30);
      }
    }

    function updateSize() {
      const width = widthSlider.value;

      canvas.style.width = width + "px";
      canvas.style.height = "65px";
      widthValue.textContent = width;

      requestAnimationFrame(() => {
        r.resizeDrawingSurfaceToCanvas();
      });
    }

    colorPicker.addEventListener("input", () => {
      updateColor(colorPicker.value);
    });

    widthSlider.addEventListener("input", updateSize);
  </script>
</body>
</html>
