<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CTA Component Demo</title>

<script src="https://unpkg.com/@rive-app/canvas@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    background:#111111;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Inter,Arial,sans-serif;
    color:white;
}

.card{
    width:900px;
    max-width:90vw;
    background:#282828;
    border-radius:20px;
    padding:40px;
    box-shadow:0 30px 80px rgba(0,0,0,.35);
}

.preview{
    background:#1b1b1b;
    border-radius:20px;
    height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

canvas{
    width:213px;
    height:65px;
    display:block;
}

.controls{
    margin-top:32px;
    display:flex;
    justify-content:space-between;
    gap:48px;
    flex-wrap:wrap;
}

.group{
    display:flex;
    flex-direction:column;
    gap:12px;
}

label{
    color:#D2D2D2;
    font-size:15px;
}

.color-ui{
    background:#1b1b1b;
    border-radius:16px;
    padding:16px;
}

.color-row{
    margin-top:14px;
    display:flex;
    align-items:center;
    gap:12px;
}

.color-preview{
    width:42px;
    height:42px;
    border-radius:10px;
    background:#FFB429;
    border:2px solid rgba(255,255,255,.2);
}

.hex-input{
    width:110px;
    height:42px;
    border:1px solid rgba(255,255,255,.16);
    border-radius:10px;
    background:#282828;
    color:white;
    padding:0 12px;
    font-size:14px;
    outline:none;
}

input[type=range]{
    width:320px;
}

.value{
    font-weight:700;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <div class="preview">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">

        <div class="group">
            <label>Shape color</label>

            <div class="color-ui">
                <div id="colorPicker"></div>

                <div class="color-row">
                    <div id="colorPreview" class="color-preview"></div>
                    <input id="hexInput" class="hex-input" value="#FFB429">
                </div>
            </div>
        </div>

        <div class="group">
            <label>Artboard width</label>

            <input id="widthSlider" type="range" min="113" max="600" value="213">

            <div class="value">
                Width:
                <span id="widthValue">213</span>px
            </div>
        </div>

        <div class="group">
            <label>Animation velocity</label>

            <input id="velocitySlider" type="range" min="0.5" max="2" step="0.1" value="1">

            <div class="value">
                Speed:
                <span id="velocityValue">1.0</span>x
            </div>
        </div>

        <div class="group">
            <label>Click intensity</label>

            <input id="intensitySlider" type="range" min="100" max="150" step="1" value="100">

            <div class="value">
                Intensity:
                <span id="intensityValue">100</span>%
            </div>
        </div>

    </div>

</div>

<script>
const canvas=document.getElementById("canvas");

const widthSlider=document.getElementById("widthSlider");
const widthValue=document.getElementById("widthValue");

const velocitySlider=document.getElementById("velocitySlider");
const velocityValue=document.getElementById("velocityValue");

const intensitySlider=document.getElementById("intensitySlider");
const intensityValue=document.getElementById("intensityValue");

const colorPreview=document.getElementById("colorPreview");
const hexInput=document.getElementById("hexInput");

let shapeColorProperty=null;
let intensityInput=null;

const picker=new iro.ColorPicker("#colorPicker",{
    width:260,
    color:"#FFB429",
    borderWidth:0,
    layout:[
        {component:iro.ui.Box},
        {
            component:iro.ui.Slider,
            options:{sliderType:"hue"}
        }
    ]
});

const riveFile=new rive.Rive({
    src:"cta_click.riv",
    canvas:canvas,
    autoplay:true,
    autoBind:true,
    stateMachines:"State Machine 1",

    layout:new rive.Layout({
        fit:rive.Fit.Layout,
        alignment:rive.Alignment.Center
    }),

    onLoad(){
        riveFile.resizeDrawingSurfaceToCanvas();

        const vm=riveFile.viewModelInstance;
        shapeColorProperty=vm.color("shapeColor");

        const inputs=riveFile.stateMachineInputs("State Machine 1");
        intensityInput=inputs.find(input=>input.name==="intensity");

        updateColor("#FFB429");
        updateWidth();
        updateVelocity();
        updateIntensity();
    }
});

function hexToRiveColor(hex){
    const clean=hex.replace("#","");
    return Number("0xFF"+clean);
}

function normalizeHex(value){
    let clean=value.replace("#","").trim();

    if(clean.length===3){
        clean=clean[0]+clean[0]+clean[1]+clean[1]+clean[2]+clean[2];
    }

    if(clean.length!==6){
        return null;
    }

    return "#"+clean.toUpperCase();
}

function updateColor(hex){
    const normalized=normalizeHex(hex);

    if(!normalized){
        return;
    }

    colorPreview.style.background=normalized;
    hexInput.value=normalized;

    if(shapeColorProperty){
        shapeColorProperty.value=hexToRiveColor(normalized);
    }
}

function updateWidth(){
    const width=parseInt(widthSlider.value);

    canvas.style.width=width+"px";
    canvas.style.height="65px";

    widthValue.textContent=width;

    requestAnimationFrame(()=>{
        riveFile.resizeDrawingSurfaceToCanvas();
    });
}

function updateVelocity(){
    const speed=parseFloat(velocitySlider.value);

    velocityValue.textContent=speed.toFixed(1);

    riveFile.speed=speed;
}

function updateIntensity(){
    const intensity=parseInt(intensitySlider.value);

    intensityValue.textContent=intensity;

    if(intensityInput){
        intensityInput.value=intensity/100;
    }
}

picker.on("color:change",(color)=>{
    updateColor(color.hexString);
});

hexInput.addEventListener("input",()=>{
    const normalized=normalizeHex(hexInput.value);

    if(normalized){
        picker.color.hexString=normalized;
        updateColor(normalized);
    }
});

widthSlider.addEventListener("input",updateWidth);
velocitySlider.addEventListener("input",updateVelocity);
intensitySlider.addEventListener("input",updateIntensity);
</script>

</body>
</html>
